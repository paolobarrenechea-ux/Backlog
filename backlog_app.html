<!DOCTYPE html>

<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f6f3; color: #1a1a18; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { padding: 0 20px; background: #fff; border-bottom: 0.5px solid #e0e0dc; display: flex; align-items: center; justify-content: space-between; height: 52px; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; }
.header-title { font-size: 15px; font-weight: 500; }
.header-sub { font-size: 12px; color: #999; }
.nav-tabs { display: flex; gap: 0; }
.nav-tab { padding: 0 18px; height: 52px; display: flex; align-items: center; font-size: 13px; color: #999; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
.nav-tab:hover { color: #444; }
.nav-tab.active { color: #1a1a18; font-weight: 500; border-bottom-color: #1a1a18; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #f7f6f3; border: 0.5px solid #e0e0dc; color: #666; cursor: pointer; transition: background 0.15s; }
.sync-btn:hover { background: #eeede9; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #3B6D11; }

/* VIEWS */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* DASHBOARD */
.dash-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.section-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.metric-card { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 500; line-height: 1; }
.metric-sub { font-size: 11px; color: #bbb; margin-top: 4px; }
.metric-card.alert .metric-value { color: #A32D2D; }
.metric-card.warn .metric-value { color: #854F0B; }
.metric-card.ok .metric-value { color: #3B6D11; }

.projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.project-card { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 14px 16px; }
.project-card.blocked { border-left: 3px solid #E24B4A; }
.project-card.warning { border-left: 3px solid #EF9F27; }
.project-card.ok { border-left: 3px solid #639922; }
.project-card.done { border-left: 3px solid #ccc; opacity: 0.6; }
.project-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
.project-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
.project-area { font-size: 11px; color: #999; margin-top: 2px; }
.estado-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
.badge-proceso { background: #E6F1FB; color: #185FA5; }
.badge-finalizado { background: #EAF3DE; color: #3B6D11; }
.badge-bloqueado { background: #FCEBEB; color: #A32D2D; }
.badge-iniciar { background: #f0f0ed; color: #888; }

.progress-bar-bg { background: #f0f0ed; border-radius: 4px; height: 5px; margin: 8px 0 6px; }
.progress-bar-fill { height: 5px; border-radius: 4px; background: #639922; transition: width 0.4s; }
.project-bottom { display: flex; justify-content: space-between; align-items: center; }
.project-pct { font-size: 12px; font-weight: 500; color: #444; }
.project-next { font-size: 11px; color: #999; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.pending-list { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 10px; overflow: hidden; }
.pending-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 16px; border-bottom: 0.5px solid #f0f0ed; }
.pending-item:last-child { border-bottom: none; }
.pending-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
.pending-content { flex: 1; min-width: 0; }
.pending-title { font-size: 13px; font-weight: 500; }
.pending-proj { font-size: 11px; color: #999; margin-top: 2px; }
.pending-right { text-align: right; flex-shrink: 0; }
.pending-prio { font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.prio-alta { background: #FCEBEB; color: #A32D2D; }
.prio-media { background: #FAEEDA; color: #854F0B; }

/* CHAT */
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 86%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
.msg.user .msg-avatar { background: #1a1a18; color: #fff; }
.msg.assistant .msg-avatar { background: #E6F1FB; color: #185FA5; font-size: 14px; }
.msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; }
.msg.user .msg-bubble { background: #1a1a18; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant .msg-bubble { background: #fff; color: #1a1a18; border: 0.5px solid #e0e0dc; border-bottom-left-radius: 4px; }
.msg-bubble strong { font-weight: 500; }

.changes-card { background: #f7f6f3; border: 0.5px solid #e0e0dc; border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
.changes-title { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.change-row { display: flex; gap: 8px; padding: 3px 0; font-size: 12px; color: #444; line-height: 1.5; border-bottom: 0.5px solid #eee; }
.change-row:last-of-type { border-bottom: none; }
.change-icon { flex-shrink: 0; }
.confirm-btns { display: flex; gap: 8px; margin-top: 10px; }
.cbtn { padding: 6px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; border: 0.5px solid #e0e0dc; transition: all 0.15s; }
.cbtn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.cbtn.primary:hover { background: #333; }
.cbtn.secondary { background: #fff; color: #666; }
.cbtn.secondary:hover { background: #f5f5f3; }
.cbtn:disabled { opacity: 0.4; cursor: not-allowed; }

.typing { display: flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.1); opacity: 1; } }

.input-area { padding: 12px 20px; background: #fff; border-top: 0.5px solid #e0e0dc; flex-shrink: 0; }
.quick-btns { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.qbtn { font-size: 12px; padding: 4px 11px; border-radius: 20px; background: #f7f6f3; border: 0.5px solid #e0e0dc; color: #555; cursor: pointer; transition: background 0.15s; }
.qbtn:hover { background: #eeede9; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
textarea { flex: 1; border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 9px 13px; font-family: inherit; font-size: 14px; resize: none; min-height: 40px; max-height: 110px; background: #f7f6f3; color: #1a1a18; outline: none; line-height: 1.5; }
textarea:focus { border-color: #aaa; background: #fff; }
textarea::placeholder { color: #bbb; }
.send-btn { width: 40px; height: 40px; border-radius: 10px; background: #1a1a18; color: #fff; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn:hover { background: #333; }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }

.empty-state { text-align: center; color: #bbb; font-size: 13px; padding: 2rem; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot" id="logo-dot"></div>

<!-- DASHBOARD VIEW -->

</div>

<!-- CHAT VIEW -->
<div class="view" id="view-chat">
  <div class="chat-area" id="chat-area">

<script>
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycby0MCjtTaGkmyIyuHXh5I_bgm9aA1NHhUAk-Ydu3nRlf8M2hT8_qO1Q4EjN4Qs6Tu_1pw/exec";

    { nombre: "Habilitación HARE", estado: "Finalizado", avance: 100 },
    { nombre: "Business Case y comité de eficiencias", estado: "Finalizado", avance: 100 },
    { nombre: "Análisis propuesta económica Niubiz", estado: "En proceso", avance: 20 },
    { nombre: "Criterios PSI con wallets", estado: "En proceso", avance: 10 },
    { nombre: "Piloto extracomisiones - Reprocesos Niubiz", estado: "En proceso", avance: 30 }
  ]},
  { id: "REN-IZI", nombre: "Renovación IziPay", area: "PSI", estado: "Por iniciar", avance: 0, proximoPaso: "Iniciar levantamiento de condiciones comerciales", prioridad: "Alta", fechaInicio: "", actividades: [
    { nombre: "Levantamiento condiciones comerciales", estado: "Por iniciar", avance: 0 },
    { nombre: "Elaboración Business Case IziPay", estado: "Por iniciar", avance: 0 }
  ]},
  { id: "PLAFT", nombre: "Comercios con alerta Plaft", area: "Compliance / Riesgo", estado: "En proceso", avance: 15, proximoPaso: "Clasificar comercios por tipo de alerta", prioridad: "Alta", fechaInicio: "15/06/2025", actividades: [
    { nombre: "Extracción y depuración base alertados", estado: "En proceso", avance: 30 },
    { nombre: "Clasificación por tipo de alerta", estado: "Por iniciar", avance: 0 },
    { nombre: "Plan de acción y seguimiento hasta resolución", estado: "Por iniciar", avance: 0 }
  ]},
  { id: "REC", nombre: "Análisis de Reclamos", area: "Reclamos", estado: "En proceso", avance: 30, proximoPaso: "Finalizar actualización del PPT de reclamos", prioridad: "Media", fechaInicio: "15/06/2025", actividades: [
    { nombre: "Análisis por casuística y tipo de tarjeta - PPT", estado: "En proceso", avance: 30 },
    { nombre: "Revisión speech contact center", estado: "En proceso", avance: 20 },
    { nombre: "Revisión proceso y facultades", estado: "Por iniciar", avance: 0 },
    { nombre: "Tablero de control reclamos Loyalty", estado: "En proceso", avance: 20 }
  ]},
  { id: "LOYAL", nombre: "Identificación Causa Raíz Loyalty", area: "Procesos Loyalty", estado: "En proceso", avance: 25, proximoPaso: "Segmentar clientes afectados y cuantificar", prioridad: "Alta", fechaInicio: "01/05/2025", actividades: [
    { nombre: "Impacto clientes por modificación de puntos por segmento", estado: "En proceso", avance: 40 },
    { nombre: "Comunicaciones PMO modificación de plazos", estado: "Finalizado", avance: 100 },
    { nombre: "Piloto extracomisiones: Partidas transitorias (Discovery)", estado: "En proceso", avance: 20 },
    { nombre: "Piloto extracomisiones: Reprocesos reclamos Niubiz", estado: "En proceso", avance: 20 }
  ]},
  { id: "TRANS", nombre: "Revisión Partidas Transitorias", area: "PSI / Finanzas", estado: "En proceso", avance: 15, proximoPaso: "Identificar antigüedad y responsable de cada partida", prioridad: "Alta", fechaInicio: "15/06/2025", actividades: [

  ]},
  { id: "MINS", nombre: "Minsait - Business Case", area: "Minsait", estado: "En proceso", avance: 10, proximoPaso: "Avanzar en estructura y cifras del BC", prioridad: "Alta", fechaInicio: "15/06/2025", actividades: [
    { nombre: "Elaboración estructura y análisis del BC Minsait", estado: "En proceso", avance: 10 }
  ]},
  { id: "REWARDS", nombre: "Renovación Rewards", area: "Gestión de Cartera", estado: "Finalizado", avance: 100, proximoPaso: "", prioridad: "Alta", fechaInicio: "15/06/2025", actividades: [
    { nombre: "Reunión de renovación y aprobación contrato Rewards", estado: "Finalizado", avance: 100 }
  ]}
];

// ─── NAVIGATION ───
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  event.target.classList.add('active');
  if (v === 'dashboard') loadDashboard();
}

// ─── DASHBOARD ───
function getColor(p) {
  if (p.estado === 'Finalizado') return 'done';
  if (p.estado === 'Bloqueado') return 'blocked';
  if (p.avance === 0 && p.estado === 'Por iniciar') return 'warning';
  if (p.avance < 20 && p.estado === 'En proceso') return 'warning';
  return 'ok';
}

function getBadge(estado) {
  const map = { 'En proceso': 'badge-proceso', 'Finalizado': 'badge-finalizado', 'Bloqueado': 'badge-bloqueado', 'Por iniciar': 'badge-iniciar' };
  return map[estado] || 'badge-iniciar';
}

function loadDashboard() {
  setStatus('loading');
  const activos = PROJECTS.filter(p => p.estado !== 'Finalizado');
  const finalizados = PROJECTS.filter(p => p.estado === 'Finalizado');
  const sinFecha = activos.filter(p => !p.fechaInicio);
  const porIniciar = activos.filter(p => p.estado === 'Por iniciar');

  // Pendientes críticos: actividades en proceso sin próximo paso, o prioridad alta sin avance
  const criticos = [];
  activos.forEach(p => {
    p.actividades.forEach(a => {
      if (a.estado === 'En proceso' && a.avance === 0) criticos.push({ titulo: a.nombre, proyecto: p.nombre, prio: p.prioridad });
      if (a.estado === 'Por iniciar' && p.prioridad === 'Alta') criticos.push({ titulo: a.nombre, proyecto: p.nombre, prio: p.prioridad });
    });
  });

  const avancePromedio = activos.length ? Math.round(activos.reduce((s, p) => s + p.avance, 0) / activos.length) : 0;

  let html = '';

  // Métricas
  html += `<div>
    <div class="section-label">Resumen general</div>
    <div class="metrics-grid">
      <div class="metric-card ${activos.length > 5 ? 'warn' : 'ok'}">
        <div class="metric-label">Proyectos activos</div>
        <div class="metric-value">${activos.length}</div>
        <div class="metric-sub">${finalizados.length} finalizado${finalizados.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="metric-card ${porIniciar.length > 0 ? 'warn' : 'ok'}">
        <div class="metric-label">Por iniciar</div>
        <div class="metric-value">${porIniciar.length}</div>
        <div class="metric-sub">sin arrancar aún</div>
      </div>
      <div class="metric-card ${criticos.length > 5 ? 'alert' : criticos.length > 2 ? 'warn' : 'ok'}">
        <div class="metric-label">Pendientes críticos</div>
        <div class="metric-value">${criticos.length}</div>
        <div class="metric-sub">actividades sin avance</div>
      </div>
      <div class="metric-card ok">
        <div class="metric-label">Avance promedio</div>
        <div class="metric-value">${avancePromedio}%</div>
        <div class="metric-sub">sobre proyectos activos</div>
      </div>
    </div>
  </div>`;

  // Proyectos activos
  html += `<div>
    <div class="section-label">Proyectos activos</div>
    <div class="projects-grid">`;

  activos.forEach(p => {
    const color = getColor(p);
    const badge = getBadge(p.estado);
    const barColor = p.avance >= 70 ? '#639922' : p.avance >= 30 ? '#EF9F27' : '#E24B4A';
    html += `<div class="project-card ${color}">
      <div class="project-top">
        <div>
          <div class="project-name">${p.nombre}</div>
          <div class="project-area">${p.area}</div>
        </div>
        <span class="estado-badge ${badge}">${p.estado}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${p.avance}%; background:${barColor}"></div>
      </div>
      <div class="project-bottom">
        <span class="project-pct">${p.avance}%</span>
        <span class="project-next">${p.proximoPaso || '—'}</span>
      </div>
    </div>`;
  });

  html += `</div></div>`;

  // Pendientes críticos
  if (criticos.length > 0) {
    html += `<div>
      <div class="section-label">Pendientes sin avance</div>
      <div class="pending-list">`;

    criticos.slice(0, 10).forEach(c => {
      html += `<div class="pending-item">
        <span class="pending-icon">⚠️</span>
        <div class="pending-content">
          <div class="pending-title">${c.titulo}</div>
          <div class="pending-proj">${c.proyecto}</div>
        </div>
        <div class="pending-right">
          <span class="pending-prio ${c.prio === 'Alta' ? 'prio-alta' : 'prio-media'}">${c.prio}</span>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  // Finalizado hoy
  if (finalizados.length > 0) {
    html += `<div>
      <div class="section-label">Finalizados</div>
      <div class="projects-grid">`;
    finalizados.forEach(p => {
      html += `<div class="project-card done">
        <div class="project-top">
          <div>
            <div class="project-name">${p.nombre}</div>
            <div class="project-area">${p.area}</div>
          </div>
          <span class="estado-badge badge-finalizado">✅ Listo</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('dash-content').innerHTML = html;
  setStatus('ok');
}

function setStatus(s) {
  const dot = document.getElementById('status-dot');
  const ldot = document.getElementById('logo-dot');
  const colors = { ok: '#3B6D11', loading: '#185FA5', error: '#A32D2D' };
  dot.style.background = colors[s] || colors.ok;
  ldot.style.background = colors[s] || colors.ok;
}

// ─── CHAT ───
const SYSTEM_PROMPT = `Eres el asistente personal de backlog de Paolo Barrenechea, consultor. Tu trabajo es ayudarle a gestionar sus proyectos, responder qué tiene pendiente, y cuando corresponda, generar operaciones para actualizar su Google Sheets.

IDs existentes de proyectos: REN-NIU, REN-IZI, PLAFT, REC, LOYAL, TRANS, MINS, REWARDS.
Para nuevos proyectos usa IDs cortos descriptivos (ej: CAMP, REPOR, AUDIT).
Para actividades: PROYECTO-01, PROYECTO-02, etc.

INSTRUCCIONES:

3. Si hay cambios, incluye AL FINAL (sin markdown ni backticks):

let conversationHistory = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function scrollBottom() {
  const a = document.getElementById('chat-area');
  a.scrollTop = a.scrollHeight;
}

function addMsg(role, text, ops) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'user' ? 'PB' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  if (ops && ops.length) bubble.appendChild(buildChangesCard(ops));

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  scrollBottom();
}

function buildChangesCard(ops) {
  const card = document.createElement('div');
  card.className = 'changes-card';
  const title = document.createElement('div');
  title.className = 'changes-title';
  title.textContent = ops.length + ' cambio' + (ops.length > 1 ? 's' : '') + ' para aplicar en tu Sheets';
  card.appendChild(title);

  ops.forEach(op => {
    const row = document.createElement('div');
    row.className = 'change-row';
    let icon = '✏️', txt = '';
    if (op.type === 'UPDATE_ROW') {
      txt = '<strong>' + op.id + '</strong> — ' + Object.entries(op.fields).map(([k,v]) => k + ': <strong>' + v + '</strong>').join(', ');
    } else if (op.type === 'ADD_ROW') {
      icon = '➕';
      txt = 'Nuevo: <strong>' + (op.row?.['Actividad / Descripción'] || op.row?.Proyecto || op.row?.ID) + '</strong>';
    } else if (op.type === 'CLOSE_PROJECT') {
      icon = '✅';
      txt = 'Cerrar <strong>' + op.id + '</strong> y todas sus subactividades';
    }
    row.innerHTML = '<span class="change-icon">' + icon + '</span><span style="flex:1;font-size:12px;color:#444">' + txt + '</span>';
    card.appendChild(row);
  });

  const btns = document.createElement('div');
  btns.className = 'confirm-btns';
  const ok = document.createElement('button');
  ok.className = 'cbtn primary'; ok.textContent = 'Aplicar en Sheets';
  const cancel = document.createElement('button');
  cancel.className = 'cbtn secondary'; cancel.textContent = 'Ignorar';

  ok.onclick = () => applyOps(ops, ok, cancel);
  cancel.onclick = () => { card.style.opacity = '0.4'; ok.disabled = true; cancel.disabled = true; };

  btns.appendChild(ok); btns.appendChild(cancel);
  card.appendChild(btns);
  return card;
}

async function applyOps(ops, okBtn, cancelBtn) {
  okBtn.disabled = true; cancelBtn.disabled = true;
  okBtn.textContent = 'Aplicando...';
  setStatus('loading');
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: SECRET, operations: ops }),
      redirect: 'follow'
    });
    const data = await res.json().catch(() => ({ ok: false, error: 'Respuesta inválida' }));
    if (data.ok) {
      okBtn.textContent = '✅ Aplicado'; okBtn.style.background = '#3B6D11';
      setStatus('ok');
      addMsg('assistant', 'Perfecto, tu Sheets está actualizado. ¿Algo más?');
    } else {
      okBtn.textContent = '❌ Error'; okBtn.disabled = false;
      setStatus('error');
      addMsg('assistant', 'Hubo un error: ' + (data.error || 'desconocido'));
    }
  } catch(err) {
    okBtn.textContent = 'Reintentar'; okBtn.disabled = false;
    setStatus('error');
    addMsg('assistant', 'No pude conectarme: ' + err.message);
  }
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const d = document.createElement('div');
  d.className = 'msg assistant'; d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">✦</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(d); scrollBottom();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });
  addTyping();
  setStatus('loading');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: SYSTEM_PROMPT, messages: conversationHistory })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || 'No pude procesar tu mensaje.';

    let display = raw, ops = null;
    const match = raw.match(/OPERACIONES_JSON:(\{[\s\S]*\})/);
    if (match) {
      display = raw.replace(/OPERACIONES_JSON:[\s\S]*$/, '').trim();
      try { ops = JSON.parse(match[1]).operations; } catch(e) {}
    }

    conversationHistory.push({ role: 'assistant', content: raw });
    document.getElementById('typing')?.remove();
    addMsg('assistant', display, ops);
    setStatus('ok');
  } catch(err) {
    document.getElementById('typing')?.remove();
    addMsg('assistant', 'Error de conexión: ' + err.message);
    setStatus('error');
  }
  document.getElementById('send-btn').disabled = false;
}

// Init
loadDashboard();
</script>
